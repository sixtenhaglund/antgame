<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ant Game</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="hud">aim with mouse &nbsp;•&nbsp; W/A/S/D to move &nbsp;•&nbsp; click to bite &nbsp;•&nbsp; E for ability &nbsp;•&nbsp; scroll to zoom</div>
  <canvas id="game"></canvas>

  <!-- Start menu, shown at the beginning. Buttons are filled in by game.js. -->
  <div id="menu">
    <h1>ANT GAME</h1>
    <!-- Step 1: pick a rank -->
    <div id="step1">
      <p>Choose your rank</p>
      <div id="ranks"></div>
    </div>
    <!-- Step 2: pick a type (hidden until a rank is chosen) -->
    <div id="step2" style="display: none">
      <p>Choose your type</p>
      <div id="types"></div>
      <button id="backBtn">← back to rank</button>
    </div>
  </div>

  <!-- Scripts load top to bottom and share their variables.
       game.js is last because it uses things the others define. -->
  <script src="input.js"></script>
  <script src="ants.js"></script>
  <script src="game.js"></script>
</body>
</html>
